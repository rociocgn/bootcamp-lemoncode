<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>POC 3 - Grid de cartas</title>
    <style>
      body { font-family: system-ui, sans-serif; padding: 2rem; background: #f5f5f2; }
      h1 { font-size: 1.2rem; font-weight: 500; margin-bottom: 1.5rem; }
      #tablero {
        display: grid;
        grid-template-columns: repeat(4, 90px);
        gap: 10px;
      }
      .carta {
        width: 90px; height: 126px;
        background: #e8e7e3;
        border: 1px solid #d3d1c7; border-radius: 12px;
        display: flex; align-items: center; justify-content: center;
        font-size: 1.6rem; color: #888;
      }
      p { margin-top: 1rem; font-size: 13px; color: #888; }
    </style>
  </head>
  <body>
    <h1>POC 3 — Grid 4×3 de cartas boca abajo</h1>

    <div id="tablero"></div>

    <p>12 cartas en una rejilla de 4 columnas × 3 filas. Sin interacción.</p>

    <script>
      const tablero = document.getElementById("tablero");
      const TOTAL = 12;

      for (let i = 0; i < TOTAL; i++) {
        const div = document.createElement("div");
        div.className = "carta";
        div.textContent = "?";
        tablero.appendChild(div);
      }
    </script>
  </body>
</html>
